# fly.toml -- GameDayWire Backend
# Deploy: fly deploy
# Set secrets: fly secrets set SERPAPI_KEY=... GROQ_API_KEY=... ADMIN_TOKEN=... WEBHOOK_SECRET=...
# Database (Turso): fly secrets set DATABASE_URL="libsql://your-db.turso.io" TURSO_AUTH_TOKEN="your_token"

app = "gamedaywire"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  # DATABASE_URL must be set via fly secrets set (Turso remote database)
  # Do NOT put the connection string or auth token in this file.
  # See docs/turso-setup.md for setup instructions.

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

# NOTE: No [[mounts]] section -- Turso (libSQL) is the database, not SQLite on a Fly Volume.
# The DATABASE_URL and TURSO_AUTH_TOKEN are set via fly secrets.
