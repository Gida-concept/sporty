# fly.toml app configuration file generated for gamedaywire on 2026-06-26T15:14:05Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gamedaywire'
primary_region = 'cdg'

[build]
  dockerfile = 'backend/Dockerfile'

[env]
  NODE_ENV = 'production'

[http_service]
  internal_port = 8080
  force_https = true

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 50
    soft_limit = 25

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
