# fly.toml app configuration file generated for gamedaywire on 2026-06-26T15:14:05Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gamedaywire-api'
primary_region = 'cdg'

[build]
  dockerfile = 'backend/Dockerfile'

[env]
  NODE_ENV = 'production'

[http_service]
  internal_port = 8080
  force_https = true

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 50
    soft_limit = 25

  [http_service.healthcheck]
    path = "/api/health"
    method = "GET"
    interval = "30s"
    timeout = "10s"
    grace_period = "30s"
